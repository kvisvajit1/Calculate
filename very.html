<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>VishuXpay · Offline</title>

    <!-- jsQR from CDN (cached after first load) -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js">
    </script>

    <style>
        /* ──────────────────────────────────────────────────────────────
           ROOT VARIABLES & RESET – Light Theme Only
        ────────────────────────────────────────────────────────────── */
        :root {
            --bg-primary: #f0f2f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.60);
            --bg-card-hover: rgba(255, 255, 255, 0.80);
            --bg-nav: rgba(255, 255, 255, 0.72);
            --bg-input: rgba(255, 255, 255, 0.80);
            --text-primary: #1c1c1e;
            --text-secondary: #6c6c70;
            --text-muted: #8e8e93;
            --border-color: rgba(60, 60, 67, 0.08);
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.10);
            --radius: 28px;
            --radius-sm: 16px;
            --radius-xs: 12px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            --gradient-primary: linear-gradient(135deg, #6C63FF 0%, #5a52d5 100%);
            --gradient-accent: linear-gradient(135deg, #FF6584 0%, #e85572 100%);
            --glass-blur: blur(25px);
            --glass-border: rgba(255, 255, 255, 0.50);
            --safe-bottom: env(safe-area-inset-bottom, 12px);
            --btn-shadow: 0 4px 16px rgba(108, 99, 255, 0.30);
            --btn-shadow-hover: 0 6px 24px rgba(108, 99, 255, 0.40);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }

        #app {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 860px;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 32px;
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--glass-border);
            overflow: hidden;
            transition: background var(--transition), box-shadow var(--transition);
            position: relative;
            animation: appEntry 0.6s var(--transition-bounce);
        }

        @keyframes appEntry {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ─── SCROLLBAR ─── */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 10px;
        }

        /* ─── HEADER ─── */
        .header {
            padding: 16px 20px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }
        .header-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .header-brand .logo {
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.30);
            transition: all var(--transition);
        }
        .header-brand .logo:hover {
            transform: rotate(-5deg) scale(1.05);
        }
        .header-brand h1 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .header-btn:hover {
            transform: scale(1.05);
            background: var(--bg-card-hover);
        }
        .header-btn:active {
            transform: scale(0.92);
        }
        .header-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform var(--transition);
        }
        .header-btn:hover svg {
            transform: rotate(20deg);
        }

        /* ─── BALANCE CARD ─── */
        .balance-card {
            margin: 4px 16px 14px;
            padding: 20px 24px;
            background: var(--gradient-primary);
            border-radius: var(--radius);
            box-shadow: 0 8px 28px rgba(108, 99, 255, 0.25);
            color: #fff;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            transition: all var(--transition);
            display: flex;
            flex-direction: column;
        }
        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            pointer-events: none;
            animation: orbFloat 8s ease-in-out infinite;
        }
        .balance-card::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -10%;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            pointer-events: none;
            animation: orbFloat 10s ease-in-out infinite reverse;
        }
        @keyframes orbFloat {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(20px, -20px) scale(1.1);
            }
            66% {
                transform: translate(-10px, 10px) scale(0.9);
            }
        }
        .balance-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .balance-actions {
            display: flex;
            gap: 6px;
        }
        .balance-actions button {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .balance-actions button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        .balance-actions button:active {
            transform: scale(0.94);
        }
        .balance-actions button svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
        .balance-amount {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 2px 0 4px;
            position: relative;
            z-index: 1;
            letter-spacing: -1px;
            transition: all 0.3s;
        }
        .balance-amount.pulse {
            animation: amountPulse 0.4s var(--transition-bounce);
        }
        @keyframes amountPulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
            100% {
                transform: scale(1);
            }
        }
        .balance-sub {
            font-size: 0.75rem;
            opacity: 0.8;
            position: relative;
            z-index: 1;
            display: flex;
            gap: 16px;
            align-items: center;
        }
        .balance-sub span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .balance-sub svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* ─── CONTENT ─── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 8px;
            scroll-behavior: smooth;
        }

        .screen {
            display: none;
            animation: screenIn 0.4s var(--transition-bounce);
        }
        .screen.active {
            display: block;
        }

        @keyframes screenIn {
            from {
                opacity: 0;
                transform: translateY(16px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ─── CARDS ─── */
        .card {
            background: var(--bg-card);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: var(--radius);
            padding: 16px 18px;
            margin-bottom: 14px;
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
            transition: all var(--transition);
        }
        .card:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-title .title-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-title .title-left svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }
        .card-title .action-link {
            font-size: 0.7rem;
            text-transform: none;
            color: #6C63FF;
            cursor: pointer;
            font-weight: 500;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 8px;
            transition: all var(--transition);
        }
        .card-title .action-link:hover {
            background: rgba(108, 99, 255, 0.08);
            transform: translateX(2px);
        }

        /* ─── QUICK ACTIONS ─── */
        .quick-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .quick-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 14px 4px;
            border-radius: var(--radius-sm);
            background: rgba(108, 99, 255, 0.05);
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        .quick-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            background: rgba(108, 99, 255, 0.08);
        }
        .quick-item:active {
            transform: scale(0.94);
        }
        .quick-item .icon {
            width: 46px;
            height: 46px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
        }
        .quick-item .icon svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transition: transform var(--transition);
        }
        .quick-item:hover .icon svg {
            transform: scale(1.10) rotate(-4deg);
        }
        .quick-item .icon-purple {
            background: rgba(108, 99, 255, 0.15);
            color: #6C63FF;
        }
        .quick-item .icon-green {
            background: rgba(52, 199, 89, 0.12);
            color: #34c759;
        }
        .quick-item .icon-pink {
            background: rgba(255, 101, 132, 0.12);
            color: #FF6584;
        }

        /* ─── BUTTONS ─── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all var(--transition);
            font-family: inherit;
            color: #fff;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
            min-height: 52px;
        }
        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0);
            transition: background var(--transition);
        }
        .btn:hover::after {
            background: rgba(255, 255, 255, 0.08);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn:active::after {
            background: rgba(255, 255, 255, 0.15);
            transition: background 0.05s;
        }
        .btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
            transition: transform var(--transition);
        }
        .btn:hover svg {
            transform: translateX(2px) scale(1.05);
        }
        .btn-primary {
            background: var(--gradient-primary);
            box-shadow: var(--btn-shadow);
        }
        .btn-primary:hover {
            box-shadow: var(--btn-shadow-hover);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            border: 1px solid var(--glass-border);
        }
        .btn-secondary:hover {
            background: var(--bg-card-hover);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .btn-success {
            background: var(--gradient-accent);
            box-shadow: 0 4px 16px rgba(255, 101, 132, 0.30);
        }
        .btn-success:hover {
            box-shadow: 0 6px 24px rgba(255, 101, 132, 0.45);
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #ff3b30;
            box-shadow: 0 4px 16px rgba(255, 59, 48, 0.25);
        }
        .btn-danger:hover {
            box-shadow: 0 6px 24px rgba(255, 59, 48, 0.40);
            transform: translateY(-2px);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            box-shadow: none;
        }
        .btn-ghost:hover {
            background: var(--bg-card);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            transform: none !important;
        }

        /* ─── INPUT ─── */
        .input {
            width: 100%;
            padding: 14px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all var(--transition);
            font-family: inherit;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .input:focus {
            border-color: #6C63FF;
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.10);
            transform: translateY(-1px);
        }
        .input::placeholder {
            color: var(--text-muted);
        }

        /* ─── TRANSACTIONS ─── */
        .tx-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all var(--transition);
            border-radius: var(--radius-xs);
        }
        .tx-item:hover {
            background: var(--bg-card-hover);
            padding: 10px 12px;
            margin: 0 -12px;
            border-radius: var(--radius-xs);
            border-bottom-color: transparent;
        }
        .tx-item:active {
            transform: scale(0.98);
        }
        .tx-item:last-child {
            border-bottom: none;
        }
        .tx-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .tx-icon-sent {
            background: rgba(255, 59, 48, 0.10);
            color: #ff3b30;
        }
        .tx-icon-received {
            background: rgba(52, 199, 89, 0.10);
            color: #34c759;
        }
        .tx-icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
        .tx-info {
            flex: 1;
            min-width: 0;
        }
        .tx-info .name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .tx-info .meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .tx-amount {
            font-weight: 700;
            font-size: 0.95rem;
            flex-shrink: 0;
        }
        .tx-amount-sent {
            color: #ff3b30;
        }
        .tx-amount-received {
            color: #34c759;
        }

        /* ─── QR CONTAINER ─── */
        .qr-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            background: #fff;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow);
            margin: 8px auto;
            max-width: 100%;
            overflow: hidden;
            transition: all var(--transition);
            animation: qrPop 0.4s var(--transition-bounce);
        }
        @keyframes qrPop {
            from {
                opacity: 0;
                transform: scale(0.8) rotate(-3deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }
        .qr-container canvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .qr-container .qr-placeholder {
            padding: 30px 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
        }

        /* ─── FULL SCREEN SCANNER ─── */
        .scanner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            background: #000;
            display: none;
            flex-direction: column;
            animation: scannerSlideUp 0.4s var(--transition-bounce);
        }
        .scanner-overlay.active {
            display: flex;
        }
        @keyframes scannerSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .scanner-overlay video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .scanner-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.50) 0%, transparent 100%);
        }
        .scanner-header .scanner-title {
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .scanner-header .btn-close {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scanner-header .btn-close:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }
        .scanner-header .btn-close svg {
            width: 24px;
            height: 24px;
            fill: #fff;
        }
        .scan-overlay-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 2px solid rgba(255, 255, 255, 0.80);
            border-radius: 20px;
            box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.45);
            pointer-events: none;
            z-index: 5;
            animation: pulseBorder 1.8s ease-in-out infinite;
        }
        .scan-overlay-center::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: #6C63FF;
            border-radius: 2px;
            animation: scanLine 2s ease-in-out infinite;
        }
        @keyframes scanLine {
            0%,
            100% {
                top: -2px;
            }
            50% {
                top: calc(100% + 2px);
            }
        }
        @keyframes pulseBorder {
            0%,
            100% {
                border-color: rgba(255, 255, 255, 0.70);
                box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.40);
            }
            50% {
                border-color: rgba(255, 255, 255, 0.30);
                box-shadow: 0 0 0 4000px rgba(0, 0, 0, 0.30);
            }
        }
        .scanner-footer {
            position: absolute;
            bottom: 60px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            padding: 0 20px;
        }
        .scanner-footer .btn {
            flex: 1;
            max-width: 160px;
            padding: 12px;
            border-radius: 30px;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.10);
            min-height: 48px;
        }
        .scanner-footer .btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .scanner-footer .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* ─── BOTTOM NAV ─── */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 8px calc(8px + var(--safe-bottom));
            background: var(--bg-nav);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--glass-border);
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 0.55rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all var(--transition);
            padding: 4px 12px;
            border-radius: 12px;
            user-select: none;
            border: none;
            background: transparent;
            font-family: inherit;
            gap: 2px;
            min-width: 52px;
            position: relative;
        }
        .nav-item::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            border-radius: 2px;
            background: #6C63FF;
            transition: width var(--transition);
        }
        .nav-item.active::after {
            width: 20px;
        }
        .nav-item:hover {
            color: var(--text-primary);
            transform: translateY(-2px);
        }
        .nav-item.active {
            color: #6C63FF;
        }
        .nav-item .nav-icon {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-item .nav-icon svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: transform var(--transition);
        }
        .nav-item:hover .nav-icon svg {
            transform: translateY(-2px) scale(1.05);
        }
        .nav-item .nav-label {
            font-weight: 500;
            letter-spacing: 0.2px;
        }
        .nav-item.active .nav-label {
            font-weight: 600;
        }

        /* ─── TOAST ─── */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: var(--bg-primary);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.85rem;
            z-index: 999;
            box-shadow: var(--shadow-lg);
            animation: toastIn 0.4s var(--transition-bounce), toastOut 0.4s 2.5s var(--transition-bounce) forwards;
            pointer-events: none;
            max-width: 90%;
            text-align: center;
            transition: all var(--transition);
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px) scale(0.90);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(-50%) translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(20px) scale(0.90);
            }
        }

        /* ─── CONTACTS / PROFILE ─── */
        .contact-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gradient-primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .contact-avatar:hover {
            transform: scale(1.10);
        }
        .profile-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 0;
        }
        .profile-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--gradient-primary);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(108, 99, 255, 0.20);
            transition: all var(--transition);
        }
        .profile-avatar:hover {
            transform: scale(1.05) rotate(-4deg);
        }
        .profile-info {
            flex: 1;
            min-width: 0;
        }
        .profile-info .name {
            font-weight: 700;
            font-size: 1.1rem;
        }
        .profile-info .sub {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: all var(--transition);
            border-radius: var(--radius-xs);
        }
        .settings-item:hover {
            background: var(--bg-card-hover);
            transform: translateX(4px);
        }
        .settings-item:active {
            transform: scale(0.98);
        }
        .settings-item:last-child {
            border-bottom: none;
        }
        .settings-item .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .settings-item .left .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
        }
        .settings-item .left .icon svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transition: transform var(--transition);
        }
        .settings-item:hover .left .icon svg {
            transform: rotate(10deg) scale(1.10);
        }
        .settings-item .left .label {
            font-weight: 500;
            font-size: 0.9rem;
        }
        .settings-item .right {
            color: var(--text-muted);
            font-size: 0.8rem;
            transition: transform var(--transition);
        }
        .settings-item:hover .right {
            transform: translateX(4px);
        }

        .empty-state {
            text-align: center;
            padding: 30px 10px;
            color: var(--text-muted);
        }
        .empty-state .icon {
            display: flex;
            justify-content: center;
            margin-bottom: 8px;
            opacity: 0.4;
        }
        .empty-state .icon svg {
            width: 48px;
            height: 48px;
            fill: currentColor;
            animation: emptyFloat 3s ease-in-out infinite;
        }
        @keyframes emptyFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        .empty-state .title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 4px;
        }
        .empty-state .desc {
            font-size: 0.8rem;
        }

        .contact-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px 4px 8px;
            border-radius: 30px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all var(--transition);
        }
        .contact-chip:hover {
            transform: scale(1.05);
            background: var(--bg-card-hover);
        }
        .contact-chip:active {
            transform: scale(0.94);
        }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 480px) {
            body {
                padding: 0;
            }
            #app {
                border-radius: 0;
                max-height: 100vh;
                height: 100vh;
                max-width: 100%;
            }
            .header-brand h1 {
                font-size: 1.1rem;
            }
            .balance-amount {
                font-size: 2.2rem;
            }
            .quick-grid {
                gap: 6px;
            }
            .quick-item {
                padding: 10px 2px;
                font-size: 0.6rem;
            }
            .quick-item .icon {
                width: 38px;
                height: 38px;
            }
            .quick-item .icon svg {
                width: 20px;
                height: 20px;
            }
            .scan-overlay-center {
                width: 200px;
                height: 200px;
            }
            .qr-container canvas {
                max-width: 160px;
            }
        }
        @media (max-height: 700px) {
            .balance-card {
                padding: 14px 18px;
                margin: 4px 14px 10px;
            }
            .balance-amount {
                font-size: 1.8rem;
            }
            .quick-item {
                padding: 6px 2px;
            }
            .quick-item .icon {
                width: 32px;
                height: 32px;
            }
            .quick-item .icon svg {
                width: 18px;
                height: 18px;
            }
            .card {
                padding: 12px 14px;
                margin-bottom: 10px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.9rem;
                min-height: 44px;
            }
            .scan-overlay-center {
                width: 160px;
                height: 160px;
            }
        }
    </style>
</head>
<body>

    <div id="app">

        <!-- ─── HEADER ─── -->
        <header class="header">
            <div class="header-brand">
                <div class="logo">V</div>
                <h1>VishuXpay</h1>
            </div>
            <div class="header-actions">

                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </button>
            </div>
        </header>

        <!-- ─── BALANCE CARD ─── -->
        <div class="balance-card" id="balanceCard">
            <div class="balance-top">

                    <button id="refreshBalanceBtn">

                    </button>
                </div>
            </div>
            <div class="balance-amount" id="balanceDisplay">₹2,89,850</div>
            <div class="balance-sub">
                <span>
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span id="userNameDisplay">User</span>
                </span>
                <span>
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>

        </div>

        <!-- ─── CONTENT ─── -->
        <div class="content">

            <!-- ═══ HOME ═══ -->
            <div id="homeScreen" class="screen active">
                <div class="card">
                    <div class="quick-grid">
                        <button class="quick-item" data-tab="send">
                            <div class="icon icon-purple">
                                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>

                            </div>
                            <span>Receive</span>
                        </button>
                        <button class="quick-item" data-tab="history">
                            <div class="icon icon-pink">
                                <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.23-3.5-2.08V8H12z"/></svg>
                            </div>
                            <span>History</span>
                        </button>
                    </div>

                <div class="card">
                    <div class="card-title">
                        <span class="title-left">
                            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.08V8H12z"/></svg>

                    <div id="recentList">

                            <div class="icon">
                                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/></svg>

                        <button class="btn btn-secondary" id="scanPaymentQRBtn" style="margin-top:8px;">
                            <svg viewBox="0 0 24 24"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-1c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0-2c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>

            <!-- ═══ HISTORY ═══ -->

                        </button>
                    </div>
                    <div id="searchBox" style="display:none; margin-bottom:10px;">
                        <input class="input" id="historySearch" placeholder="Search…" style="font-size:0.85rem;padding:10px 14px;" />

                    <div id="historyList">
                        <div class="empty-state">
                            <div class="icon">
                                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/></svg>
                            </div>
                            <div class="title">No transactions</div>
                            <div class="desc">Your token history</div>

                    </div>

            <!-- ═══ PROFILE ═══ -->
            <div id="profileScreen" class="screen">
                <div class="card">
                    <div class="profile-row">
                        <div class="profile-avatar" id="profileAvatar">U</div>
                        <div class="profile-info">
                            <div class="name" id="profileName">User</div>
                            <div class="sub">🔐 Wallet active</div>
                        </div>
                    </div>
                    <div style="margin-top:8px; display:flex; gap:8px;">
                        <input class="input" id="editUsernameInput" placeholder="Username" style="font-size:0.85rem;padding:10px 14px;" />
                        <button class="btn btn-primary" id="saveUsernameBtn" style="width:auto;padding:10px 18px;font-size:0.85rem;">Save</button>
                    </div>
                </div>

                <div class="card">
                    <div class="settings-item" id="contactsManageBtn">
                        <div class="left">
                            <span class="icon">
                                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                            </span>
                            <span class="label">Contacts</span>
                        </div>
                        <span class="right">→</span>
                    </div>
                </div>
            </div>

            <!-- ═══ CONTACTS ═══ -->
            <div id="contactsScreen" class="screen">
                <div class="card">
                    <div class="card-title">
                        <span class="title-left">
                            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                            Contacts
                        </span>
                        <button class="action-link" id="backFromContacts">← Back</button>
                    </div>
                    <div style="display:flex; gap:6px; margin-bottom:10px;">
                        <input class="input" id="addContactInput" placeholder="Add by name" style="font-size:0.8rem;padding:10px 14px;" />
                        <button class="btn btn-primary" id="addContactBtn" style="width:auto;padding:10px 16px;font-size:0.8rem;">Add</button>
                    </div>
                    <div id="contactsList">

    <script>

        const QRCodeCore = (function() {
            class QRMath {

                    for (let i = 8; i < 256; i++) {

                            QRMath.EXP_TABLE[i - 6] ^
                            QRMath.EXP_TABLE[i - 8];

                static glog(n) { if (n < 1) throw new Error('glog(' + n + ')'); return QRMath.LOG_TABLE[n]; }
                static gexp(n) { while (n < 0) n += 255; while (n >= 256) n -= 255; return QRMath.EXP_TABLE[n]; }
            }

            class QRPolynomial {
                constructor(num, shift) {
                    if (num.length === undefined) throw new Error(num.length + '/' + shift);
                    let offset = 0;
                    while (offset < num.length && num[offset] === 0) offset++;

                    for (let i = 0; i < num.length - offset; i++) this.num[i] = num[offset + i];
                }
                get(index) { return this.num[index]; }
                getLength() { return this.num.length; }
                multiply(e) {
                    let num = new Array(this.getLength() + e.getLength() - 1);
                    for (let i = 0; i < this.getLength(); i++) {
                        for (let j = 0; j < e.getLength(); j++) {
                            num[i + j] ^= QRMath.gexp(QRMath.glog(this.get(i)) + QRMath.glog(e.get(j)));
                        }
                    }
                    return new QRPolynomial(num, 0);
                }
                mod(e) {
                    if (this.getLength() - e.getLength() < 0) return this;
                    let ratio = QRMath.glog(this.get(0)) - QRMath.glog(e.get(0));
                    let num = new Array(this.getLength());
                    for (let i = 0; i < this.getLength(); i++) num[i] = this.get(i);
                    for (let i = 0; i < e.getLength(); i++) {
                        num[i] ^= QRMath.gexp(QRMath.glog(e.get(i)) + ratio);

            const PAD0 = 0xEC,
                PAD1 = 0x11;
            let _typeNumber, _errorCorrectLevel, _qrDataList, _modules, _moduleCount, _dataCache;
            const QRErrorCorrectLevel = { L: 1, M: 0, Q: 3, H: 2 };

            class QRCodeModel {
                constructor(typeNumber, errorCorrectLevel) {

                    _moduleCount = 0;
                    _dataCache = null;
                }
                addData(data) { _qrDataList.push(new QR8BitByte(data));

                isDark(row, col) { if (row < 0 || _moduleCount <= row || col < 0 || _moduleCount <= col) throw new Error(row +
                        ',' + col); return _modules[row][col]; }
                getModuleCount() { return _moduleCount; }
                make() { makeImpl(false, getBestMaskPattern()); }
                getBestMaskPattern() {

                        pattern = 0;
                    for (let i = 0; i < 8; i++) { makeImpl(true, i); let lostPoint = QRUtil.getLostPoint(this); if (i === 0 ||
                            minLostPoint > lostPoint) { minLostPoint = lostPoint;

                }

            function makeImpl(test, maskPattern) {
                _moduleCount = _typeNumber * 4 + 17;
                _modules = new Array(_moduleCount);
                for (let row = 0; row < _moduleCount; row++) { _modules[row] = new Array(_moduleCount); for (let col = 0; col <
                        _moduleCount; col++) _modules[row][col] = null; }
                setupPositionProbePattern(0, 0);
                setupPositionProbePattern(_moduleCount - 7, 0);
                setupPositionProbePattern(0, _moduleCount - 7);
                setupPositionAdjustPattern();
                setupTimingPattern();
                setupTypeInfo(test, maskPattern);
                if (_typeNumber >= 7) setupTypeNumber(test);
                if (!_dataCache) _dataCache = QRUtil.createData(_typeNumber, _errorCorrectLevel, _qrDataList);
                mapData(_dataCache, maskPattern);
            }

            function setupPositionProbePattern(row, col) {
                for (let r = -1; r <= 7; r++) {
                    if (row + r <= -1 || _moduleCount <= row + r) continue;
                    for (let c = -1; c <= 7; c++) {
                        if (col + c <= -1 || _moduleCount <= col + c) continue;
                        if ((0 <= r && r <= 6 && (c === 0 || c === 6)) ||
                            (0 <= c && c <= 6 && (r === 0 || r === 6)) ||
                            (2 <= r && r <= 4 && 2 <= c && c <= 4)) {
                            _modules[row + r][col + c] = true;
                        } else {
                            _modules[row + r][col + c] = false;
                        }
                    }
                }
            }

            function setupTimingPattern() {
                for (let r = 8; r < _moduleCount - 8; r++) { if (_modules[r][6] !== null) continue;
                    _modules[r][6] = (r % 2 === 0); }
                for (let c = 8; c < _moduleCount - 8; c++) { if (_modules[6][c] !== null) continue;
                    _modules[6][c] = (c % 2 === 0); }
            }

            function setupPositionAdjustPattern() {
                let pos = QRUtil.getPatternPosition(_typeNumber);
                for (let i = 0; i < pos.length; i++) {
                    for (let j = 0; j < pos.length; j++) {
                        let row = pos[i],
                            col = pos[j];
                        if (_modules[row][col] !== null) continue;
                        for (let r = -2; r <= 2; r++) {
                            for (let c = -2; c <= 2; c++) {
                                if (r === -2 || r === 2 || c === -2 || c === 2 || (r === 0 && c === 0)) {
                                    _modules[row + r][col + c] = true;
                                } else {
                                    _modules[row + r][col + c] = false;
                                }
                            }
                        }
                    }
                }
            }

            function setupTypeNumber(test) {
                let bits = QRUtil.getBCHTypeNumber(_typeNumber);
                for (let i = 0; i < 18; i++) {
                    let mod = (!test && ((bits >> i) & 1) === 1);
                    _modules[Math.floor(i / 3)][i % 3 + _moduleCount - 8 - 3] = mod;
                }
                for (let i = 0; i < 18; i++) {
                    let mod = (!test && ((bits >> i) & 1) === 1);
                    _modules[i % 3 + _moduleCount - 8 - 3][Math.floor(i / 3)] = mod;
                }
            }

            function setupTypeInfo(test, maskPattern) {
                let data = (_errorCorrectLevel << 3) | maskPattern;
                let bits = QRUtil.getBCHTypeInfo(data);
                for (let i = 0; i < 15; i++) {
                    let mod = (!test && ((bits >> i) & 1) === 1);
                    if (i < 6) _modules[i][8] = mod;
                    else if (i < 8) _modules[i + 1][8] = mod;
                    else _modules[_moduleCount - 15 + i][8] = mod;
                }
                for (let i = 0; i < 15; i++) {
                    let mod = (!test && ((bits >> i) & 1) === 1);
                    if (i < 8) _modules[8][_moduleCount - i - 1] = mod;
                    else if (i < 9) _modules[8][15 - i - 1 + 1] = mod;
                    else _modules[8][15 - i - 1] = mod;
                }

            }

            function mapData(data, maskPattern) {
                let inc = -1,
                    row = _moduleCount - 1,
                    bitIndex = 7,
                    byteIndex = 0;
                let maskFunc = QRUtil.getMaskFunction(maskPattern);
                for (let col = _moduleCount - 1; col > 0; col -= 2) {

                        for (let c = 0; c < 2; c++) {
                            if (_modules[row][col - c] === null) {
                                let dark = false;
                                if (byteIndex < data.length) { dark = ((data[byteIndex] >>> bitIndex) & 1) === 1; }
                                let mask = maskFunc(row, col - c);
                                if (mask) dark = !dark;
                                _modules[row][col - c] = dark;
                                bitIndex--;
                                if (bitIndex === -1) { byteIndex++;
                                    bitIndex = 7; }
                            }
                        }
                        row += inc;
                        if (row < 0 || _moduleCount <= row) { row -= inc;
                            inc = -inc; break; }
                    }
                }
            }

            function getBestMaskPattern() {
                let qr = new QRCodeModel(_typeNumber, _errorCorrectLevel);
                qr._qrDataList = _qrDataList;
                return qr.getBestMaskPattern();
            }

            class QR8BitByte {
                constructor(data) {
                    this.mode = 4;
                    this.data = data;
                    this.parsedData = [];

                        let byteArray = [];
                        let code = data.charCodeAt(i);
                        if (code > 0x10000) {
                            byteArray[0] = 0xF0 | ((code & 0x1C0000) >>> 18);
                            byteArray[1] = 0x80 | ((code & 0x3F000) >>> 12);
                            byteArray[2] = 0x80 | ((code & 0xFC0) >>> 6);
                            byteArray[3] = 0x80 | (code & 0x3F);
                        } else if (code > 0x800) {
                            byteArray[0] = 0xE0 | ((code & 0xF000) >>> 12);
                            byteArray[1] = 0x80 | ((code & 0xFC0) >>> 6);
                            byteArray[2] = 0x80 | (code & 0x3F);
                        } else if (code > 0x80) {
                            byteArray[0] = 0xC0 | ((code & 0x7C0) >>> 6);
                            byteArray[1] = 0x80 | (code & 0x3F);
                        } else {
                            byteArray[0] = code;
                        }
                        this.parsedData.push.apply(this.parsedData, byteArray);
                    }
                    if (this.parsedData.length !== this.getLength()) {
                        this.parsedData.unshift(191);
                        this.parsedData.unshift(187);
                        this.parsedData.unshift(239);
                    }

                getLength() { return this.parsedData.length; }
                write(buffer) { for (let i = 0, l = this.parsedData.length; i < l; i++) buffer.put(this.parsedData[i],
                    8); }
            }

            class QRBitBuffer {
                constructor() { this.buffer = [];
                    this.length = 0; }
                get(index) { let bufIndex = Math.floor(index / 8); return ((this.buffer[bufIndex] >>> (7 - index % 8)) &
                        1) === 1; }
                put(num, length) { for (let i = 0; i < length; i++) this.putBit(((num >>> (length - i - 1)) & 1) ===
                    1); }
                getLengthInBits() { return this.length; }
                putBit(bit) {
                    let bufIndex = Math.floor(this.length / 8);
                    if (this.buffer.length <= bufIndex) this.buffer.push(0);
                    if (bit) this.buffer[bufIndex] |= (0x80 >>> (this.length % 8));
                    this.length++;
                }
            }

            const QRUtil = {
                PATTERN_POSITION_TABLE: [
                    [],
                    [6, 18],
                    [6, 22],
                    [6, 26],
                    [6, 30],
                    [6, 34],
                    [6, 22, 38],
                    [6, 24, 42],
                    [6, 26, 46],
                    [6, 28, 50],
                    [6, 30, 54],
                    [6, 32, 58],
                    [6, 34, 62],
                    [6, 26, 46, 66],
                    [6, 26, 48, 70],
                    [6, 26, 50, 74],
                    [6, 30, 54, 78],
                    [6, 30, 56, 82],
                    [6, 30, 58, 86],
                    [6, 34, 62, 90],
                    [6, 28, 50, 72, 94],
                    [6, 26, 50, 74, 98],
                    [6, 30, 54, 78, 102],
                    [6, 28, 54, 80, 106],
                    [6, 32, 58, 84, 110],
                    [6, 30, 58, 86, 114],
                    [6, 34, 62, 90, 118],
                    [6, 26, 50, 74, 98, 122],
                    [6, 30, 54, 78, 102, 126],
                    [6, 26, 52, 78, 104, 130],
                    [6, 30, 56, 82, 108, 134],
                    [6, 34, 60, 86, 112, 138],
                    [6, 30, 58, 86, 114, 142],
                    [6, 34, 62, 90, 118, 146],
                    [6, 30, 54, 78, 102, 126, 150],
                    [6, 24, 50, 76, 102, 128, 154],
                    [6, 28, 54, 80, 106, 132, 158],
                    [6, 32, 58, 84, 110, 136, 162],
                    [6, 26, 54, 82, 110, 138, 166],
                    [6, 30, 58, 86, 114, 142, 170]

                G15: (1 << 10) | (1 << 8) | (1 << 5) | (1 << 4) | (1 << 2) | (1 << 1) | (1 << 0),
                G18: (1 << 12) | (1 << 11) | (1 << 10) | (1 << 9) | (1 << 8) | (1 << 5) | (1 << 2) | (1 << 0),
                G15_MASK: (1 << 14) | (1 << 12) | (1 << 10) | (1 << 4) | (1 << 1),
                getBCHTypeInfo(data) {
                    let d = data << 10;
                    while (QRUtil.getBCHDigit(d) - QRUtil.getBCHDigit(QRUtil.G15) >= 0) {

                getBCHTypeNumber(data) {

                getMaskFunction(maskPattern) {

                        case 1:
                            return function(i, j) { return i % 2 === 0; };
                        case 2:
                            return function(i, j) { return j % 3 === 0; };
                        case 3:
                            return function(i, j) { return (i + j) % 3 === 0; };
                        case 4:
                            return function(i, j) { return (Math.floor(i / 2) + Math.floor(j / 3)) % 2 === 0; };
                        case 5:
                            return function(i, j) { return (i * j) % 2 + (i * j) % 3 === 0; };
                        case 6:
                            return function(i, j) { return ((i * j) % 2 + (i * j) % 3) % 2 === 0; };

                },
                getLostPoint(qrCode) {

                            let dark = qrCode.isDark(row, col);
                            for (let r = -1; r <= 1; r++) {

                                for (let c = -1; c <= 1; c++) {
                                    if (col + c < 0 || moduleCount <= col + c) continue;
                                    if (r === 0 && c === 0) continue;

                        for (let col = 0; col < moduleCount - 1; col++) {
                            let count = 0;
                            if (qrCode.isDark(row, col)) count++;
                            if (qrCode.isDark(row + 1, col)) count++;
                            if (qrCode.isDark(row, col + 1)) count++;
                            if (qrCode.isDark(row + 1, col + 1)) count++;
                            if (count === 0 || count === 4) lostPoint += 3;
                        }

                    for (let row = 0; row < moduleCount; row++) {
                        for (let col = 0; col < moduleCount - 6; col++) {
                            if (qrCode.isDark(row, col) &&
                                !qrCode.isDark(row, col + 1) &&
                                qrCode.isDark(row, col + 2) &&
                                qrCode.isDark(row, col + 3) &&
                                qrCode.isDark(row, col + 4) &&
                                !qrCode.isDark(row, col + 5) &&
                                qrCode.isDark(row, col + 6)) {
                                lostPoint += 40;
                            }
                        }
                    }
                    for (let col = 0; col < moduleCount; col++) {
                        for (let row = 0; row < moduleCount - 6; row++) {
                            if (qrCode.isDark(row, col) &&
                                !qrCode.isDark(row + 1, col) &&
                                qrCode.isDark(row + 2, col) &&
                                qrCode.isDark(row + 3, col) &&
                                qrCode.isDark(row + 4, col) &&
                                !qrCode.isDark(row + 5, col) &&
                                qrCode.isDark(row + 6, col)) {
                                lostPoint += 40;
                            }
                        }
                    }
                    let darkCount = 0;
                    for (let col = 0; col < moduleCount; col++) {
                        for (let row = 0; row < moduleCount; row++) {
                            if (qrCode.isDark(row, col)) darkCount++;
                        }

                },
                createData(typeNumber, errorCorrectLevel, dataList) {

                    let buffer = new QRBitBuffer();

                        switch (mode) { case 4: return 16; default: throw new Error('mode:' + mode); }
                    } else if (type < 41) {

                    } else {

                    maxDcCount = 0,
