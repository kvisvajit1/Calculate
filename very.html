    <script>
        (function() {
            'use strict';

            const STORAGE = {
                PRIVATE_JWK: 'vishu_private_jwk',
                PUBLIC_RAW: 'vishu_public_raw',
                USERNAME: 'vishu_username',
                BALANCE: 'vishu_balance',
                CONTACTS: 'vishu_contacts',
                HISTORY: 'vishu_history',
                NONCES: 'vishu_nonces'
            };

            let state = {
                pubkey: null,
                username: 'User',
                balance: 0,
                contacts: {},
                history: [],
                nonces: [],
                scannedRequest: null,
                pendingTx: null,
                cameraStream: null,
                currentNonce: null,
                isScanning: false,
                torchOn: false
            };

            // ─── Crypto ───
            async function generateKeyPair() {
                const kp = await crypto.subtle.generateKey({ name: 'ECDSA', namedCurve: 'P-256' }, true, ['sign',
                    'verify'
                ]);
                const raw = await crypto.subtle.exportKey('raw', kp.publicKey);
                const jwk = await crypto.subtle.exportKey('jwk', kp.privateKey);
                return {
                    publicRaw: btoa(String.fromCharCode(...new Uint8Array(raw))),
                    privateJwk: JSON.stringify(jwk)
                };
            }

            async function sign(privJwk, data) {
                const key = await crypto.subtle.importKey('jwk', JSON.parse(privJwk), { name: 'ECDSA',
                    namedCurve: 'P-256' }, false, ['sign']);
                const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
                const sig = await crypto.subtle.sign({ name: 'ECDSA', hash: 'SHA-256' }, key, hash);
                return btoa(String.fromCharCode(...new Uint8Array(sig)));
            }

            async function verify(pubRawB64, data, sigB64) {
                try {
                    const key = await crypto.subtle.importKey('raw',
                        Uint8Array.from(atob(pubRawB64), c => c.charCodeAt(0)).buffer, { name: 'ECDSA',
                            namedCurve: 'P-256' }, false, ['verify']);
                    const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
                    return await crypto.subtle.verify({ name: 'ECDSA', hash: 'SHA-256' }, key,
                        Uint8Array.from(atob(sigB64), c => c.charCodeAt(0)).buffer, hash);
                } catch (_) { return false; }
            }

            // ─── Load / Save ───
            function loadState() {
                const priv = localStorage.getItem(STORAGE.PRIVATE_JWK);
                const pub = localStorage.getItem(STORAGE.PUBLIC_RAW);
                state.username = localStorage.getItem(STORAGE.USERNAME) || 'User';
                state.balance = parseInt(localStorage.getItem(STORAGE.BALANCE) || '0');
                state.contacts = JSON.parse(localStorage.getItem(STORAGE.CONTACTS) || '{}');
                state.history = JSON.parse(localStorage.getItem(STORAGE.HISTORY) || '[]');
                state.nonces = JSON.parse(localStorage.getItem(STORAGE.NONCES) || '[]');

                if (!priv || !pub) {
                    // New user: generate keys and give ₹500 welcome bonus
                    generateKeyPair().then(keys => {
                        localStorage.setItem(STORAGE.PRIVATE_JWK, keys.privateJwk);
                        localStorage.setItem(STORAGE.PUBLIC_RAW, keys.publicRaw);
                        state.pubkey = keys.publicRaw;
                        const uname = prompt('Choose your username:', 'User') || 'User';
                        localStorage.setItem(STORAGE.USERNAME, uname);
                        state.username = uname;
                        // Give ₹500 welcome bonus
                        state.balance = 500;
                        saveBalance();
                        updateUI();
                        showToast('🎉 Welcome ' + uname + '! ₹500 credited!');
                    });
                } else {
                    state.pubkey = pub;
                    updateUI();
                }
            }

            function saveBalance() { localStorage.setItem(STORAGE.BALANCE, state.balance.toString()); }

            function saveContacts() { localStorage.setItem(STORAGE.CONTACTS, JSON.stringify(state.contacts)); }

            function saveHistory() { localStorage.setItem(STORAGE.HISTORY, JSON.stringify(state.history)); }

            function saveNonces() { localStorage.setItem(STORAGE.NONCES, JSON.stringify(state.nonces)); }

            function saveUsername() { localStorage.setItem(STORAGE.USERNAME, state.username); }

            function getFriendlyName(pubkey) {
                return state.contacts[pubkey] || 'Unknown';
            }

            function updateUI() {
                const balanceEl = document.getElementById('balanceDisplay');
                const oldVal = balanceEl.innerText;
                const newVal = '₹' + state.balance;
                if (oldVal !== newVal) {
                    balanceEl.classList.remove('pulse');
                    balanceEl.innerText = newVal;
                    void balanceEl.offsetWidth;
                    balanceEl.classList.add('pulse');
                } else {
                    balanceEl.innerText = newVal;
                }
                document.getElementById('userNameDisplay').innerText = state.username;
                document.getElementById('profileName').innerText = state.username;
                document.getElementById('profileAvatar').innerText = state.username.charAt(0).toUpperCase();
                renderHistory();
                renderRecent();
                renderContacts();
            }

            function renderHistory(filter) {
                const list = document.getElementById('historyList');
                let items = state.history;
                if (filter) {
                    const f = filter.toLowerCase();
                    items = items.filter(tx =>
                        (tx.counterParty || '').toLowerCase().includes(f) ||
                        tx.amount.toString().includes(f)
                    );
                }
                if (!items.length) {
                    list.innerHTML =
                        `<div class="empty-state"><div class="icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/></svg></div><div class="title">No transactions</div><div class="desc">Your token history</div></div>`;
                    return;
                }
                list.innerHTML = items.map((tx, idx) => `
                    <div class="tx-item" data-idx="${idx}">
                        <div class="tx-icon ${tx.type === 'sent' ? 'tx-icon-sent' : 'tx-icon-received'}">
                            ${tx.type === 'sent' 
                                ? '<svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>'
                                : '<svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>'}
                        </div>
                        <div class="tx-info">
                            <div class="name">${tx.counterParty || 'Unknown'}</div>
                            <div class="meta">
                                <span>${tx.timestamp || ''}</span>
                                ${tx.type === 'sent' ? '<span style="color:#ff3b30;">● sent</span>' : '<span style="color:#34c759;">● received</span>'}
                            </div>
                        </div>
                        <div class="tx-amount ${tx.type === 'sent' ? 'tx-amount-sent' : 'tx-amount-received'}">${tx.type === 'sent' ? '-' : '+'} ₹${tx.amount}</div>
                    </div>
                `).join('');

                list.querySelectorAll('.tx-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.idx);
                        const tx = state.history[idx];
                        if (tx) showTxDetail(tx);
                    });
                });
            }

            function renderRecent() {
                const container = document.getElementById('recentList');
                const recent = state.history.slice(0, 5);
                if (!recent.length) {
                    container.innerHTML =
                        `<div class="empty-state"><div class="icon"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12zM6 10h2v2H6zm0 4h8v2H6zm10 0h2v2h-2zm-6-4h8v2h-8z"/></svg></div><div class="title">No transactions</div><div class="desc">Send or receive tokens</div></div>`;
                    return;
                }
                container.innerHTML = recent.map(tx => `
                    <div class="tx-item" style="padding:8px 0;">
                        <div class="tx-icon ${tx.type === 'sent' ? 'tx-icon-sent' : 'tx-icon-received'}" style="width:32px;height:32px;font-size:0.9rem;">
                            ${tx.type === 'sent' 
                                ? '<svg viewBox="0 0 24 24" width="16" height="16"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>'
                                : '<svg viewBox="0 0 24 24" width="16" height="16"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg>'}
                        </div>
                        <div class="tx-info">
                            <div class="name" style="font-size:0.85rem;">${tx.counterParty || 'Unknown'}</div>
                            <div class="meta" style="font-size:0.65rem;">${tx.timestamp || ''}</div>
                        </div>
                        <div class="tx-amount ${tx.type === 'sent' ? 'tx-amount-sent' : 'tx-amount-received'}" style="font-size:0.9rem;">${tx.type === 'sent' ? '-' : '+'} ₹${tx.amount}</div>
                    </div>
                `).join('');
            }

            function renderContacts() {
                const container = document.getElementById('contactsList');
                const keys = Object.keys(state.contacts);
                if (!keys.length) {
                    container.innerHTML =
                        `<div class="empty-state"><div class="icon"><svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg></div><div class="title">No contacts</div><div class="desc">Add or transact to save</div></div>`;
                    return;
                }
                container.innerHTML = keys.map(pub => `
                    <div class="tx-item" style="padding:8px 0;">
                        <div class="contact-avatar" style="width:36px;height:36px;font-size:0.8rem;">${(state.contacts[pub] || 'U').charAt(0).toUpperCase()}</div>
                        <div class="tx-info">
                            <div class="name" style="font-size:0.9rem;">${state.contacts[pub]}</div>
                        </div>
                        <button class="contact-chip" data-pub="${pub}" style="background:rgba(255,59,48,0.08);border:1px solid rgba(255,59,48,0.15);color:#ff3b30;font-size:0.7rem;padding:2px 10px;">Remove</button>
                    </div>
                `).join('');

                container.querySelectorAll('.contact-chip').forEach(btn => {
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        const pub = this.dataset.pub;
                        if (confirm('Remove ' + (state.contacts[pub] || 'contact') + '?')) {
                            delete state.contacts[pub];
                            saveContacts();
                            renderContacts();
                            showToast('Contact removed');
                        }
                    });
                });
            }

            function showTxDetail(tx) {
                const msg =
                    `Transaction\n\nCounterparty: ${tx.counterParty}\nAmount: ₹${tx.amount}\nType: ${tx.type}\nTime: ${tx.timestamp || 'N/A'}`;
                alert(msg);
            }

            function addHistory(type, counterPubkey, amount) {
                const name = getFriendlyName(counterPubkey);
                const entry = {
                    type,
                    counterParty: name,
                    amount,
                    timestamp: new Date().toLocaleString()
                };
                state.history.unshift(entry);
                if (state.history.length > 100) state.history.pop();
                saveHistory();
                updateUI();
            }

            function showToast(msg) {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = msg;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2600);
            }

            function vibrate(pattern) {
                try { navigator.vibrate && navigator.vibrate(pattern || 20); } catch (_) {}
            }

            // ─── Tab Switching ───
            function switchTab(tab) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                const screen = document.getElementById(tab + 'Screen');
                if (screen) screen.classList.add('active');
                const nav = document.querySelector(`.nav-item[data-tab="${tab}"]`);
                if (nav) nav.classList.add('active');
                closeScanner();
                document.getElementById('receiveResult').style.display = 'none';
                document.getElementById('receiveResult').innerHTML = '';
                if (tab === 'history') renderHistory();
                if (tab === 'profile') updateUI();
                if (tab === 'contacts') renderContacts();
                if (tab === 'receive') {
                    const area = document.getElementById('receiveRequestArea');
                    if (area.style.display !== 'none') {
                        const container = document.getElementById('receiveRequestQR');
                        if (!container.querySelector('canvas')) {
                            generateRequestQR();
                        }
                    }
                }
            }

            // ─── Full Screen Scanner ───
            const scannerOverlay = document.getElementById('scannerOverlay');
            const scannerVideo = document.getElementById('scannerVideo');
            let scannerResolve = null;

            function openScanner() {
                return new Promise((resolve) => {
                    scannerResolve = resolve;
                    scannerOverlay.classList.add('active');
                    startScannerStream();
                });
            }

            function closeScanner() {
                scannerOverlay.classList.remove('active');
                if (state.cameraStream) {
                    state.cameraStream.getTracks().forEach(t => t.stop());
                    state.cameraStream = null;
                }
                state.isScanning = false;
                state.torchOn = false;
                document.getElementById('scannerTorchBtn').textContent = 'Torch';
                if (scannerResolve) {
                    scannerResolve(null);
                    scannerResolve = null;
                }
            }

            function startScannerStream() {
                if (state.isScanning) return;
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 },
                            height: { ideal: 480 } } })
                    .then(stream => {
                        state.cameraStream = stream;
                        state.isScanning = true;
                        scannerVideo.srcObject = stream;
                        scannerVideo.play();

                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        let frameId = null;
                        let lastResult = null;

                        function scan() {
                            if (!state.isScanning || !state.cameraStream || !scannerOverlay.classList.contains(
                                    'active')) {
                                if (frameId) cancelAnimationFrame(frameId);
                                return;
                            }
                            if (scannerVideo.readyState === scannerVideo.HAVE_ENOUGH_DATA && scannerVideo
                                .videoWidth > 0) {
                                canvas.width = scannerVideo.videoWidth;
                                canvas.height = scannerVideo.videoHeight;
                                ctx.drawImage(scannerVideo, 0, 0, canvas.width, canvas.height);
                                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                                try {
                                    const code = jsQR(imgData.data, imgData.width, imgData.height, {
                                        inversionAttempts: 'dontInvert'
                                    });
                                    if (code && code.data) {
                                        const dataStr = code.data;
                                        if (dataStr !== lastResult) {
                                            lastResult = dataStr;
                                            state.isScanning = false;
                                            vibrate(30);
                                            closeScanner();
                                            if (scannerResolve) {
                                                scannerResolve(dataStr);
                                                scannerResolve = null;
                                            }
                                            return;
                                        }
                                    }
                                } catch (_) { /* ignore */ }
                            }
                            frameId = requestAnimationFrame(scan);
                        }
                        scan();
                    })
                    .catch(err => {
                        showToast('Camera error: ' + err.message);
                        closeScanner();
                    });
            }

            // Scanner controls
            document.getElementById('scannerCloseBtn').addEventListener('click', closeScanner);
            document.getElementById('scannerCancelBtn').addEventListener('click', closeScanner);
            document.getElementById('scannerTorchBtn').addEventListener('click', function() {
                if (!state.cameraStream) return;
                state.torchOn = !state.torchOn;
                const tracks = state.cameraStream.getVideoTracks();
                if (tracks.length) {
                    try {
                        tracks[0].applyConstraints({
                            advanced: [{ torch: state.torchOn }]
                        });
                    } catch (_) { /* fallback */ }
                }
                this.textContent = state.torchOn ? 'On' : 'Torch';
            });

            // ─── QR Generation ───
            function showQR(containerId, text, size) {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = '';
                const canvas = document.createElement('canvas');
                canvas.style.maxWidth = '100%';
                canvas.style.height = 'auto';
                container.appendChild(canvas);
                try {
                    renderQRToCanvas(canvas, text, size || 200, '#1c1c1e', '#ffffff', QRCodeCore.ErrorCorrectLevel.M);
                } catch (e) {
                    container.innerHTML = '<div class="qr-placeholder">Error</div>';
                    console.error(e);
                }
            }

            function generateRequestQR() {
                state.currentNonce = Math.random().toString(36).substring(2, 12) + Date.now().toString(36);
                const req = {
                    type: 'request',
                    pubkey: state.pubkey,
                    nonce: state.currentNonce,
                    senderUsername: state.username
                };
                document.getElementById('receiveRequestArea').style.display = 'block';
                document.getElementById('receiveResult').style.display = 'none';
                showQR('receiveRequestQR', JSON.stringify(req), 200);
                showToast('Show QR to sender');
            }

            // ─── Send Flow ───
            async function startSendScan() {
                document.getElementById('sendConfirmArea').style.display = 'none';
                document.getElementById('sendQRDisplay').style.display = 'none';
                state.scannedRequest = null;
                const data = await openScanner();
                if (!data) return;
                try {
                    const req = JSON.parse(data);
                    if (req.type !== 'request' || !req.pubkey || !req.nonce) {
                        showToast('Invalid request QR');
                        return;
                    }
                    if (state.nonces.includes(req.nonce)) {
                        showToast('Request already used');
                        return;
                    }
                    if (req.pubkey === state.pubkey) {
                        showToast('Cannot pay yourself');
                        return;
                    }
                    state.scannedRequest = req;
                    const name = getFriendlyName(req.pubkey) || req.senderUsername || 'Unknown';
                    document.getElementById('sendToUser').innerText = name;
                    document.getElementById('sendConfirmArea').style.display = 'block';
                    document.getElementById('sendAmount').focus();
                    showToast('Ready to pay ' + name);
                    vibrate(20);
                } catch (_) {
                    showToast('Invalid QR code');
                }
            }

            async function confirmSend() {
                const amount = parseInt(document.getElementById('sendAmount').value);
                if (isNaN(amount) || amount <= 0) {
                    showToast('Enter a valid amount');
                    return;
                }
                if (amount > state.balance) {
                    showToast('Insufficient balance');
                    return;
                }
                const req = state.scannedRequest;
                if (!req) {
                    showToast('No request scanned');
                    return;
                }

                const payload = {
                    type: 'tx',
                    from: state.pubkey,
                    to: req.pubkey,
                    amount: amount,
                    nonce: req.nonce,
                    timestamp: Date.now(),
                    senderUsername: state.username
                };

                try {
                    const sig = await sign(localStorage.getItem(STORAGE.PRIVATE_JWK), JSON.stringify(payload));
                    const signed = { payload, sig };

                    state.balance -= amount;
                    saveBalance();
                    addHistory('sent', req.pubkey, amount);

                    if (!state.contacts[req.pubkey]) {
                        state.contacts[req.pubkey] = req.senderUsername || 'User';
                        saveContacts();
                    }

                    document.getElementById('sendConfirmArea').style.display = 'none';
                    document.getElementById('sendAmount').value = '';
                    document.getElementById('sendQRDisplay').style.display = 'block';
                    showQR('sendPaymentQR', JSON.stringify(signed), 200);
                    state.pendingTx = signed;
                    updateUI();
                    vibrate(50);
                    showToast('Payment signed! Show QR to receiver.');
                } catch (e) {
                    showToast('Signing failed: ' + e.message);
                }
            }

            function cancelSend() {
                document.getElementById('sendConfirmArea').style.display = 'none';
                document.getElementById('sendQRDisplay').style.display = 'none';
                document.getElementById('sendAmount').value = '';
                state.scannedRequest = null;
                state.pendingTx = null;
                closeScanner();
            }

            function doneSend() {
                document.getElementById('sendQRDisplay').style.display = 'none';
                state.pendingTx = null;
                state.scannedRequest = null;
                switchTab('home');
            }

            // ─── Receive Flow ───
            async function startReceiveScan() {
                document.getElementById('receiveResult').style.display = 'none';
                const data = await openScanner();
                if (!data) return;
                try {
                    const signed = JSON.parse(data);
                    if (!signed.payload || !signed.sig) throw new Error('Invalid');
                    if (signed.payload.type !== 'tx') throw new Error('Not a payment');

                    const valid = await verify(signed.payload.from, JSON.stringify(signed.payload), signed.sig);
                    if (!valid) {
                        showToast('Invalid signature!');
                        vibrate(100);
                        return;
                    }

                    if (state.nonces.includes(signed.payload.nonce)) {
                        showToast('Already received');
                        return;
                    }

                    state.balance += signed.payload.amount;
                    state.nonces.push(signed.payload.nonce);
                    saveNonces();
                    saveBalance();

                    const fromName = signed.payload.senderUsername || getFriendlyName(signed.payload.from);
                    if (!state.contacts[signed.payload.from]) {
                        state.contacts[signed.payload.from] = fromName;
                        saveContacts();
                    }
                    addHistory('received', signed.payload.from, signed.payload.amount);
                    updateUI();

                    const resultEl = document.getElementById('receiveResult');
                    resultEl.innerHTML =
                        `<div style="font-size:2rem;">✓</div><div style="font-weight:600;color:#34c759;">Received ₹${signed.payload.amount}</div><div style="font-size:0.85rem;color:var(--text-muted);">from ${fromName}</div>`;
                    resultEl.style.display = 'block';
                    showToast('Received ₹' + signed.payload.amount);
                    vibrate(60);
                    state.currentNonce = null;
                    document.getElementById('receiveRequestArea').style.display = 'none';
                } catch (e) {
                    showToast('Invalid payment QR: ' + e.message);
                    vibrate(80);
                }
            }

            // ─── Add Contact ───
            function addContact() {
                const input = document.getElementById('addContactInput');
                const val = input.value.trim();
                if (!val) { showToast('Enter a name'); return; }
                showToast('Contacts are added automatically from transactions');
            }

            // ─── Init ───
            window.onload = function() {
                loadState();

                document.querySelectorAll('.nav-item').forEach(item => {
                    item.addEventListener('click', () => switchTab(item.dataset.tab));
                });

                document.querySelectorAll('.quick-item[data-tab]').forEach(el => {
                    el.addEventListener('click', () => switchTab(el.dataset.tab));
                });

                document.getElementById('profileBtn').addEventListener('click', () => switchTab('profile'));
                document.getElementById('saveUsernameBtn').addEventListener('click', function() {
                    const input = document.getElementById('editUsernameInput');
                    const val = input.value.trim();
                    if (val) {
                        state.username = val;
                        saveUsername();
                        updateUI();
                        input.value = '';
                        showToast('Username updated');
                        vibrate(10);
                    } else {
                        showToast('Enter a username');
                    }
                });
                document.getElementById('editUsernameInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('saveUsernameBtn').click();
                });

                document.getElementById('contactsManageBtn').addEventListener('click', () => {
                    switchTab('contacts');
                    renderContacts();
                });
                document.getElementById('backFromContacts').addEventListener('click', () => switchTab('profile'));
                document.getElementById('addContactBtn').addEventListener('click', addContact);
                document.getElementById('addContactInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') addContact();
                });

                document.getElementById('searchToggleBtn').addEventListener('click', function() {
                    const box = document.getElementById('searchBox');
                    box.style.display = box.style.display === 'none' ? 'block' : 'none';
                    if (box.style.display === 'block') {
                        document.getElementById('historySearch').focus();
                    }
                });
                document.getElementById('historySearch').addEventListener('input', function() {
                    renderHistory(this.value);
                });

                document.getElementById('scanReceiveQRBtn').addEventListener('click', startSendScan);
                document.getElementById('confirmSendBtn').addEventListener('click', confirmSend);
                document.getElementById('cancelSendBtn').addEventListener('click', cancelSend);
                document.getElementById('doneSendBtn').addEventListener('click', doneSend);
                document.getElementById('sendAmount').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') confirmSend();
                });

                document.getElementById('generateRequestBtn').addEventListener('click', generateRequestQR);
                document.getElementById('scanPaymentQRBtn').addEventListener('click', startReceiveScan);

                document.getElementById('refreshBalanceBtn').addEventListener('click', () => {
                    updateUI();
                    showToast('Refreshed');
                    vibrate(5);
                });

                showToast('VishuXpay ready');
            };

        })();
    </script>

</body>
